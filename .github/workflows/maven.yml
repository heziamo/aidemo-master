name: Java CI with Maven + Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 关键：必须声明权限，否则无法推送镜像到 ghcr.io
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package -DskipTests --file pom.xml

    # 步骤：将仓库名转为全小写（Docker 强制要求）
    - name: Prepare Image Metadata
      id: meta
      run: |
        IMAGE_NAME=ghcr.io/${{ github.repository }}
        echo "image_name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        # 使用内置的 GITHUB_TOKEN，无需手动创建 Secret
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        # 仅在推送 main 分支时执行 push
        push: ${{ github.event_name == 'push' }}
        # 使用上面转换后的小写标签
        tags: ${{ steps.meta.outputs.image_name }}:latest

    - name: Create Release and Upload Asset
      if: startsWith(github.ref, 'refs/tags/') # 只有推送到标签时才执行
      uses: softprops/action-gh-release@v2
      with:
        files: target/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
