<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans',sans-serif;}
        body{
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);
        }
        .card{
            width:100%;
            max-width:380px;
            background:#fff;
            border-radius:16px;
            padding:48px 40px 56px;
            box-shadow:0 20px 40px rgba(0,0,0,.08);
            transition:transform .3s;
        }
        .card:hover{transform:translateY(-4px);}
        h2{margin-bottom:24px;text-align:center;color:#333;font-weight:600;}
        .msg.error{margin-bottom:12px;text-align:center;font-size:14px;color:#e74c3c;}
        label{display:block;margin-bottom:8px;color:#555;font-size:14px;font-weight:500;}
        input{
            width:100%;
            padding:12px 16px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:15px;
            transition:border-color .3s;
        }
        input:focus{outline:none;border-color:#fcb69f;}
        .form-row{margin-bottom:20px;}
        button{
            width:100%;
            padding:14px 0;
            background:linear-gradient(135deg,#ff9a8b 0%,#ff6a88 100%);
            border:none;
            border-radius:8px;
            color:#fff;
            font-size:16px;
            cursor:pointer;
            transition:opacity .3s;
        }
        button:hover{opacity:.9;}
        .link{margin-top:20px;text-align:center;font-size:14px;}
        .link a{color:#ff6a88;text-decoration:none;}
        .link a:hover{text-decoration:underline;}
    </style>
</head>
<body>
<div class="card">
    <h2>注册</h2>
    <div class="msg error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="form-row">
            <label>用户名</label>
            <input name="name" placeholder="请输入用户名" required/>
        </div>
        <div class="form-row">
            <label>手机号</label>
            <input name="phone" placeholder="请输入手机号" required/>
        </div>
        <div class="form-row">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required/>
        </div>
        <button type="submit">注 册</button>
    </form>

    <div class="link">
        <a th:href="@{/login}">已有账号？立即登录</a>
    </div>
</div>
</body>
</html>
